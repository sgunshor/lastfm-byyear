<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/favicon_io/site.webmanifest">

  <title>Sammys 2025 · lokiimp</title>
  <style>
    :root {
      --bg:#0b0d0f;
      --panel:#111419;
      --muted:#9aa0a6;
      --accent:#8ab4f8;
      --accent-2:#3dd2b4;
      --card:#151920;
      --winner:#f0c674;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      background:radial-gradient(circle at 20% 20%, #111826 0, #0b0d0f 40%), #0b0d0f;
      color:#f5f6f7;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,sans-serif;
      min-height:100vh;
    }
    header {
      padding:32px 24px 12px;
      max-width:1100px;
      margin:0 auto;
    }
    h1 { margin:0; font-size:42px; letter-spacing:-1px; }
    p.lede { color:var(--muted); margin:8px 0 18px; max-width:720px; line-height:1.5; }
    .bar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-top:10px; }
    .pill {
      background:rgba(138,180,248,0.12);
      border:1px solid rgba(138,180,248,0.4);
      color:#e8f0ff;
      padding:8px 12px;
      border-radius:999px;
      font-size:14px;
    }
    main { max-width:1100px; margin:0 auto; padding:0 24px 64px; }
    .categories { display:flex; flex-direction:column; gap:18px; }
    .category { background:var(--panel); border:1px solid rgba(255,255,255,0.05); border-radius:16px; padding:18px; box-shadow:0 10px 30px rgba(0,0,0,0.25); position:relative; overflow:hidden; }
    .category header { padding:0; margin:0 0 14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .category h2 { margin:0; font-size:22px; }
    .category .subtitle { color:var(--muted); margin:0; }
    .category .actions { margin-left:auto; display:flex; gap:10px; }
    .btn { background:#1b2330; color:#e8f0ff; border:1px solid rgba(138,180,248,0.45); border-radius:10px; padding:9px 12px; cursor:pointer; font-weight:600; letter-spacing:0.2px; }
    .btn:hover { border-color:var(--accent); box-shadow:0 0 0 1px rgba(138,180,248,0.35); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:12px; }
    .nominee { background:var(--card); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:12px; position:relative; overflow:hidden; transition:transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease; }
    .nominee a { color:inherit; text-decoration:none; display:block; }
    .nominee:hover { transform:translateY(-4px) scale(1.01); border-color:rgba(138,180,248,0.5); box-shadow:0 12px 30px rgba(0,0,0,0.35); }
    .nominee-art { height:120px; border-radius:10px; background:linear-gradient(135deg, rgba(138,180,248,0.25), rgba(61,210,180,0.2)); position:relative; overflow:hidden; }
    .nominee[data-has-image="true"] .nominee-art { background-size:cover; background-position:center; color:#f5f6f7; text-shadow:0 2px 10px rgba(0,0,0,0.5); }
    .nominee .name { margin:10px 0 4px; font-size:16px; font-weight:700; }
    .nominee .meta { margin:0; color:var(--muted); font-size:14px; }
    .blurb { position:absolute; inset:0; background:linear-gradient(180deg, rgba(11,13,15,0) 0%, rgba(11,13,15,0.9) 40%); opacity:0; transition:opacity 180ms ease; padding:16px; display:flex; align-items:flex-end; color:#f5f6f7; font-size:14px; line-height:1.4; }
    .nominee:hover .blurb { opacity:1; }
    .category[data-revealed="true"] .nominee:hover .blurb { opacity:0; }
    .badge { position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.6); color:var(--muted); border:1px solid rgba(255,255,255,0.2); padding:4px 8px; border-radius:999px; font-size:12px; letter-spacing:0.3px; text-transform:uppercase; }
    .nominee.winner { border-color:rgba(240,198,116,0.8); box-shadow:0 12px 38px rgba(240,198,116,0.25), 0 0 0 1px rgba(240,198,116,0.6); }
    .nominee.winner .badge { background:linear-gradient(90deg, rgba(240,198,116,0.15), rgba(240,198,116,0.35)); color:#ffeca1; border-color:rgba(240,198,116,0.6); }
    .nominee .winner-label { display:none; position:absolute; top:10px; left:10px; padding:6px 10px; border-radius:12px; background:rgba(240,198,116,0.2); color:#ffeca1; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; font-size:12px; }
    .nominee.winner .winner-label { display:inline-block; }
    .nominee-art .embed-frame { position:absolute; inset:0; width:100%; height:100%; border:0; border-radius:10px; }
    .nominee-art .embed-html { position:absolute; inset:0; width:100%; height:100%; border:0; }
    .category .banner { position:absolute; top:-60px; right:-70px; width:200px; height:200px; background:radial-gradient(circle at 30% 30%, rgba(138,180,248,0.35), transparent 60%); transform:rotate(25deg); pointer-events:none; }
    @media (max-width:720px) {
      h1 { font-size:32px; }
    }
    /* larger posters for Best Picture */
    .category#best-picture .grid { grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:14px; }
    .category#best-picture .nominee-art { height:220px; }
    .category#best-picture .name { font-size:14px; margin-top:8px }
    /* square album/record art */
    .category#album-of-the-year .nominee-art,
    .category#record-of-the-year .nominee-art { aspect-ratio:1/1; height:auto; min-height:160px; }
    /* portrait embeds for Shortform */
    .category#best-shortform-video .grid { grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:14px; }
    .category#best-shortform-video .nominee { transition:none; }
    .category#best-shortform-video .nominee:hover { transform:none; border-color:rgba(255,255,255,0.08); box-shadow:none; }
    .category#best-shortform-video .nominee-art { aspect-ratio:9/16; height:auto; min-height:320px; background:#0f1116; }
    .category#best-shortform-video .blurb { display:none; }
    /* tweets styling */
    .category#tweets .nominee { transition:none; }
    .category#tweets .nominee:hover { transform:none; border-color:rgba(255,255,255,0.08); box-shadow:none; }
    .category#tweets .grid { grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); }
    .category#tweets .blurb { display:none; }
    .category#tweets .nominee-art { height:auto; min-height:220px; background:transparent; }
    .category#tweets .nominee-art .embed-html { position:relative; inset:auto; width:100%; height:auto; }
    .category#tweets blockquote.twitter-tweet { margin:0 auto; width:100%; }
    .category#tweets .meta { margin-top:6px; color:#e8f0ff; }
    /* longform embeds */
    .category#longform-video .grid { grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:12px; }
    .category#longform-video .nominee-art { aspect-ratio:16/9; height:auto; min-height:180px; background:#0f1116; background-size:cover; background-position:center; }
    .category#longform-video .nominee-art .embed-frame { border-radius:10px; }
    .category#longform-video .nominee.embed-active { transition:none; }
    .category#longform-video .nominee.embed-active:hover { transform:none; border-color:rgba(255,255,255,0.08); box-shadow:none; }
    .confetti { position:absolute; width:8px; height:14px; background:var(--accent); opacity:0.95; animation:confetti-fall var(--dur, 900ms) ease-out forwards; }
    @keyframes confetti-fall {
      from { transform:translate3d(0, 0, 0) rotate(var(--rot-start, 0deg)); }
      to { transform:translate3d(var(--drift, 0px), 180px, 0) rotate(var(--rot-end, 320deg)); opacity:0; }
    }
  </style>
</head>
<body>
  <header style="display:flex;align-items:center;gap:12px;">
    <h1 style="margin:0">Sammys 2025</h1>
    <div style="margin-left:auto">
      <a href="../" style="color:var(--accent);text-decoration:none;text-transform:lowercase">home</a>
    </div>
  </header>

  <main>
    <section class="categories" id="categories"></section>
  </main>

  <script src="../sammys.js"></script>
</body>
</html>
